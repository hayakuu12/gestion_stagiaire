<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a3a6b" stroke="#c8a84b" stroke-width="4"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#c8a84b" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Scale of Justice - base -->
  <rect x="96" y="140" width="8" height="25" fill="#c8a84b"/>
  <rect x="76" y="162" width="48" height="5" rx="2" fill="#c8a84b"/>

  <!-- Scale beam -->
  <rect x="55" y="108" width="90" height="5" rx="2.5" fill="#c8a84b"/>
  <line x1="100" y1="75" x2="100" y2="110" stroke="#c8a84b" stroke-width="3"/>

  <!-- Left pan -->
  <line x1="68" y1="110" x2="60" y2="130" stroke="#c8a84b" stroke-width="2"/>
  <line x1="68" y1="110" x2="80" y2="130" stroke="#c8a84b" stroke-width="2"/>
  <path d="M58,130 Q70,138 82,130" stroke="#c8a84b" stroke-width="2" fill="rgba(200,168,75,0.2)"/>

  <!-- Right pan -->
  <line x1="132" y1="110" x2="120" y2="130" stroke="#c8a84b" stroke-width="2"/>
  <line x1="132" y1="110" x2="142" y2="130" stroke="#c8a84b" stroke-width="2"/>
  <path d="M118,130 Q130,138 144,130" stroke="#c8a84b" stroke-width="2" fill="rgba(200,168,75,0.2)"/>

  <!-- Star at top -->
  <polygon points="100,50 104,64 118,64 107,72 111,86 100,78 89,86 93,72 82,64 96,64" fill="#c8a84b"/>

  <!-- Arabic text: وزارة العدل -->
  <text x="100" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c8a84b" font-weight="bold">وزارة العدل</text>
  <text x="100" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(200,168,75,0.8)">المملكة المغربية</text>
</svg>
